<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Sisyphox 的博客 — 记录思考, 分享所得。"
        />
        <title>Sisyphox</title>
        <link rel="stylesheet" href="/css/style.css" />
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="/js/blog.js"></script>
    </head>
    <body>
        <!-- ========== Header ========== -->
        <header class="site-header">
            <div class="site-title">
                <a href="/">Sisyphox</a>
            </div>
            <nav class="site-nav">
                <a href="/">博客</a>
                <a href="/?page=about">关于</a>
            </nav>
            <button
                class="theme-toggle"
                id="themeToggle"
                aria-label="切换暗色模式"
                title="切换暗色模式"
            >
                🌓
            </button>
        </header>

        <!-- ========== Main Content ========== -->
        <div class="container">
            <main>
                <!-- 由 blog.js 动态填充 -->
            </main>
        </div>

        <!-- ========== Footer ========== -->
        <footer class="site-footer">
            <p>
                &copy; <span id="currentYear"></span> Sisyphox · Powered by
                <a
                    href="https://pages.github.com"
                    target="_blank"
                    rel="noopener"
                    >GitHub Pages</a
                >
            </p>
        </footer>

        <script>
            document.getElementById("currentYear").textContent =
                new Date().getFullYear();
        </script>
    </body>
</html>
